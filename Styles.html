<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{

    font-family:
        "Segoe UI",
        Arial,
        sans-serif;

    background:#F5F7FA;

    color:#2D3748;

}

.app{

    display:flex;

    min-height:100vh;

}


/***************************************************
SIDEBAR
***************************************************/

.sidebar{

    width:260px;

    background:#0F5132;

    color:white;

    display:flex;

    flex-direction:column;

}

.logo{

    padding:28px;

    font-size:24px;

    font-weight:bold;

    border-bottom:1px solid rgba(255,255,255,.10);

}

.menu{

    padding:20px;

}

.menu a{

    display:block;

    color:white;

    text-decoration:none;

    padding:14px 16px;

    border-radius:8px;

    margin-bottom:8px;

    transition:.2s;

}

.menu a:hover{

    background:rgba(255,255,255,.12);

}

.menu a.active{

    background:white;

    color:#0F5132;

    font-weight:600;

}


/***************************************************
CONTENIDO
***************************************************/

.content{

    flex:1;

    padding:35px;

    overflow:auto;

}


/***************************************************
HEADER
***************************************************/

.pageHeader{

    display:flex;

    justify-content:space-between;

    align-items:center;

    margin-bottom:35px;

}

.pageHeader h1{

    font-size:34px;

    margin-bottom:6px;

}

.pageHeader p{

    color:#718096;

}


/***************************************************
BOTONES
***************************************************/

.primaryButton{

    background:#0F5132;

    color:white;

    border:none;

    padding:12px 22px;

    border-radius:8px;

    cursor:pointer;

    font-size:15px;

}

.primaryButton:hover{

    background:#146C43;

}


/***************************************************
KPIs
***************************************************/

.kpiGrid{

    display:grid;

    grid-template-columns:repeat(6,1fr);

    gap:18px;

    margin-bottom:28px;

}

.kpiCard{

    background:white;

    border-radius:12px;

    padding:20px;

    box-shadow:0 3px 12px rgba(0,0,0,.05);

}

.kpiCard span{

    color:#718096;

    display:block;

    margin-bottom:10px;

    font-size:14px;

}

.kpiCard h2{

    font-size:34px;

}

.kpiCard.danger{

    border-left:5px solid #DC3545;

}


/***************************************************
GRID DASHBOARD
***************************************************/

.dashboardGrid{

    display:grid;

    grid-template-columns:repeat(3,1fr);

    gap:20px;

    margin-bottom:20px;

}

.panel{

    background:white;

    border-radius:12px;

    padding:22px;

    box-shadow:0 3px 12px rgba(0,0,0,.05);

    min-height:220px;

}

.panel h2{

    margin-bottom:18px;

    font-size:20px;

    color:#0F5132;

}

.panel p{

    color:#718096;

}


/***************************************************
TABLAS
***************************************************/

table{

    width:100%;

    border-collapse:collapse;

}

th{

    text-align:left;

    padding:12px;

    background:#F7FAFC;

}

td{

    padding:12px;

    border-bottom:1px solid #EDF2F7;

}


/***************************************************
BADGES
***************************************************/

.badge{

    display:inline-block;

    padding:5px 12px;

    border-radius:20px;

    font-size:12px;

    font-weight:600;

}

.badge.success{

    background:#D1FAE5;

    color:#065F46;

}

.badge.warning{

    background:#FEF3C7;

    color:#92400E;

}

.badge.danger{

    background:#FEE2E2;

    color:#991B1B;

}


/***************************************************
RESPONSIVE
***************************************************/

@media(max-width:1400px){

    .kpiGrid{

        grid-template-columns:repeat(3,1fr);

    }

}

@media(max-width:1100px){

    .dashboardGrid{

        grid-template-columns:1fr;

    }

}

@media(max-width:800px){

    .app{

        flex-direction:column;

    }

    .sidebar{

        width:100%;

    }

    .kpiGrid{

        grid-template-columns:repeat(2,1fr);

    }

}


/***************************************************
PERSONAS
***************************************************/

.personasPage{

    --vn-green-900:#0F5132;
    --vn-green-800:#146C43;
    --vn-green-700:#198754;
    --vn-green-100:#EAF7EE;
    --vn-lime-300:#B6D957;
    --vn-ink-900:#1F2937;
    --vn-ink-700:#4B5563;
    --vn-ink-500:#6B7280;
    --vn-line:#E5E7EB;
    --vn-surface:#FFFFFF;

    color:var(--vn-ink-900);
}

.personasHeader{

    display:flex;
    align-items:flex-start;
    justify-content:space-between;
    gap:18px;
    margin-bottom:22px;
}

.personasHeader h1{

    font-size:32px;
    line-height:1.1;
    letter-spacing:-.02em;
    margin-bottom:6px;
}

.personasHeader p{

    color:var(--vn-ink-500);
}


/***************************************************
Formularios
***************************************************/

.personasPage input,
.personasPage select,
.personasPage button{

    font:inherit;
}

.personasPage input[type="text"],
.personasPage select{

    width:100%;
    height:42px;
    border:1px solid var(--vn-line);
    border-radius:10px;
    background:#FFF;
    color:var(--vn-ink-900);
    padding:0 12px;
    outline:none;
    transition:border-color .18s ease, box-shadow .18s ease;
}

.personasPage input[type="text"]:focus,
.personasPage select:focus{

    border-color:var(--vn-green-700);
    box-shadow:0 0 0 3px rgba(25,135,84,.16);
}

.personasPage select{

    appearance:none;
    background-image:linear-gradient(45deg, transparent 50%, #6B7280 50%), linear-gradient(135deg, #6B7280 50%, transparent 50%);
    background-position:calc(100% - 18px) 17px, calc(100% - 12px) 17px;
    background-size:6px 6px, 6px 6px;
    background-repeat:no-repeat;
    padding-right:34px;
}


/***************************************************
Buscador
***************************************************/

.personasPage .searchBox{

    position:relative;
    display:flex;
    align-items:center;
    gap:8px;
    min-width:300px;
    flex:1.2;
    padding:0 8px 0 12px;
    border:1px solid var(--vn-line);
    border-radius:12px;
    background:var(--vn-surface);
    box-shadow:0 1px 2px rgba(15,81,50,.05);
}

.personasPage .searchBox span{

    color:var(--vn-ink-500);
}

.personasPage .searchBox input{

    border:none;
    height:44px;
    padding:0;
    background:transparent;
    box-shadow:none;
}

.personasPage .searchBox button{

    width:28px;
    height:28px;
    border:none;
    border-radius:50%;
    background:#F3F4F6;
    color:#6B7280;
    cursor:pointer;
}

.personasPage .searchBox button:hover{

    background:#E5E7EB;
    color:#111827;
}


/***************************************************
Filtros
***************************************************/

.personasFilters{

    display:flex;
    align-items:flex-end;
    flex-wrap:wrap;
    gap:12px;
    margin-bottom:14px;
}

.personasPage .filterGroup{

    min-width:190px;
    flex:1;
}

.personasPage .filterGroup label{

    display:block;
    margin:0 0 6px;
    font-size:12px;
    letter-spacing:.02em;
    color:var(--vn-ink-500);
    font-weight:600;
}


/***************************************************
Tarjetas KPI
***************************************************/

.personasKpiGrid{

    display:grid;
    grid-template-columns:repeat(5, minmax(180px,1fr));
    gap:12px;
    margin-bottom:18px;
}

.personasKpiCard{

    display:flex;
    align-items:center;
    gap:12px;
    padding:14px;
    background:var(--vn-surface);
    border:1px solid var(--vn-line);
    border-radius:14px;
    box-shadow:0 8px 20px rgba(15,81,50,.05);
}

.personasKpiCard span{

    display:block;
    font-size:12px;
    color:var(--vn-ink-500);
    margin-bottom:2px;
}

.personasKpiCard strong{

    display:block;
    font-size:26px;
    line-height:1;
    letter-spacing:-.01em;
    color:var(--vn-ink-900);
}

.personasKpiCard small{

    color:var(--vn-ink-500);
    font-size:11px;
}

.kpiBubble{

    width:42px;
    height:42px;
    border-radius:12px;
    display:grid;
    place-items:center;
    font-size:20px;
    box-shadow:inset 0 0 0 1px rgba(255,255,255,.35);
}

.kpiBubble.blue{ background:#DBEAFE; }
.kpiBubble.green{ background:#DCFCE7; }
.kpiBubble.purple{ background:#F3E8FF; }
.kpiBubble.orange{ background:#FFEDD5; }
.kpiBubble.red{ background:#FEE2E2; }


/***************************************************
Filas tipo ERP
***************************************************/

.personasToolbar{

    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:10px;
    background:linear-gradient(180deg, #FFFFFF 0%, #FAFAFA 100%);
    border:1px solid var(--vn-line);
    border-radius:12px;
    padding:10px 12px;
    margin-bottom:12px;
    color:var(--vn-ink-700);
    font-size:13px;
}

.personasToolbar button{

    border:1px solid var(--vn-line);
    background:#FFFFFF;
    color:#374151;
    border-radius:9px;
    padding:7px 10px;
    cursor:pointer;
}

.personasToolbar button:hover{

    border-color:#CBD5E1;
    background:#F8FAFC;
}

.personasList{

    display:flex;
    flex-direction:column;
    gap:10px;
}

.personaRow{

    display:grid;
    grid-template-columns:minmax(240px, 1.55fr) minmax(165px, 1fr) minmax(130px, .85fr) minmax(130px, .85fr) minmax(120px, .65fr) minmax(110px, .6fr) 95px minmax(170px, 1fr) 150px;
    align-items:center;
    gap:12px;
    background:#FFF;
    border:1px solid var(--vn-line);
    border-radius:14px;
    padding:12px;
    box-shadow:0 2px 6px rgba(17,24,39,.03);
}

.personaRow:hover{

    border-color:#C7E3D1;
    box-shadow:0 10px 22px rgba(15,81,50,.08);
    transform:translateY(-1px);
}

.personaIdentity{

    display:flex;
    align-items:center;
    gap:10px;
}

.personaIdentity h3{

    font-size:15px;
    margin:0 0 2px;
}

.personaIdentity p{

    color:var(--vn-ink-500);
    font-size:12px;
    margin:0 0 6px;
}

.personaMeta,
.personaProgress,
.personaMetric,
.nextAction{

    display:flex;
    flex-direction:column;
    gap:4px;
}

.personaMeta small,
.personaProgress small,
.personaMetric small,
.nextAction small{

    color:var(--vn-ink-500);
    font-size:11px;
}

.personaMeta strong,
.personaProgress strong,
.personaMetric strong,
.nextAction strong{

    font-size:13px;
    line-height:1.3;
}


/***************************************************
Avatar
***************************************************/

.personasPage .avatar{

    position:relative;
    width:44px;
    height:44px;
    border-radius:13px;
    background:linear-gradient(145deg, #EAF7EE 0%, #D6F0E0 100%);
    color:var(--vn-green-900);
    display:grid;
    place-items:center;
    font-weight:700;
    font-size:13px;
    border:1px solid #CBE7D7;
}

.statusDot{

    position:absolute;
    right:-2px;
    bottom:-2px;
    width:12px;
    height:12px;
    border-radius:50%;
    border:2px solid #FFF;
}

.statusDot.bajo{ background:#22C55E; }
.statusDot.medio{ background:#F59E0B; }
.statusDot.alto{ background:#EF4444; }


/***************************************************
Badges
***************************************************/

.programBadge{

    display:inline-flex;
    align-items:center;
    height:24px;
    border-radius:999px;
    padding:0 10px;
    font-size:11px;
    font-weight:700;
    letter-spacing:.02em;
    border:1px solid transparent;
}

.programBadge.nueva{

    background:#EAF7EE;
    color:#0F5132;
    border-color:#C7E3D1;
}

.programBadge.mili{

    background:#EEF2FF;
    color:#3730A3;
    border-color:#DDE4FF;
}


/***************************************************
Barras de progreso
***************************************************/

.miniProgress{

    width:100%;
    height:7px;
    border-radius:999px;
    background:#ECFDF3;
    overflow:hidden;
}

.miniProgress > div{

    height:100%;
    border-radius:inherit;
    background:linear-gradient(90deg, #35A06A 0%, #198754 100%);
}

.miniProgress.checklist{

    background:#EFF6FF;
}

.miniProgress.checklist > div{

    background:linear-gradient(90deg, #60A5FA 0%, #2563EB 100%);
}

.sparkline,
.emptyLine{

    width:82px;
    height:6px;
    border-radius:999px;
}

.sparkline.positive{

    background:linear-gradient(90deg, #84CC16 0%, #22C55E 100%);
}

.sparkline.negative{

    background:linear-gradient(90deg, #F59E0B 0%, #EF4444 100%);
}

.emptyLine{

    background:#E5E7EB;
}


/***************************************************
Riesgo
***************************************************/

.riskBlock{

    display:flex;
    align-items:center;
    justify-content:center;
    gap:6px;
    min-height:40px;
    border-radius:11px;
    border:1px solid transparent;
    font-size:12px;
    font-weight:700;
}

.riskBlock .shield{

    font-size:14px;
}

.riskBlock.bajo{

    background:#ECFDF3;
    color:#166534;
    border-color:#BBF7D0;
}

.riskBlock.medio{

    background:#FFFBEB;
    color:#92400E;
    border-color:#FDE68A;
}

.riskBlock.alto{

    background:#FEF2F2;
    color:#991B1B;
    border-color:#FECACA;
}


/***************************************************
Botones de acción
***************************************************/

.personasPrimaryBtn,
.personasSecondaryBtn,
.openBtn{

    display:inline-flex;
    align-items:center;
    justify-content:center;
    gap:8px;
    text-decoration:none;
    border-radius:11px;
    font-size:13px;
    font-weight:600;
    cursor:pointer;
    transition:all .18s ease;
}

.personasPrimaryBtn{

    background:linear-gradient(140deg, var(--vn-green-900) 0%, var(--vn-green-700) 100%);
    color:#FFF;
    border:1px solid transparent;
    padding:11px 14px;
    box-shadow:0 8px 14px rgba(15,81,50,.22);
}

.personasPrimaryBtn:hover{

    filter:brightness(1.04);
    transform:translateY(-1px);
}

.personasSecondaryBtn{

    border:1px solid #D1D5DB;
    background:#FFFFFF;
    color:#374151;
    height:42px;
    padding:0 12px;
}

.personasSecondaryBtn:hover{

    border-color:#9CA3AF;
    background:#F9FAFB;
}

.rowActions{

    display:flex;
    justify-content:flex-end;
}

.openBtn{

    height:36px;
    padding:0 12px;
    border:1px solid #C7E3D1;
    color:var(--vn-green-900);
    background:var(--vn-green-100);
}

.openBtn:hover{

    background:#DCF1E4;
    border-color:#9DD2B5;
}


/***************************************************
Responsive para Personas
***************************************************/

@media(max-width:1650px){

    .personaRow{

        grid-template-columns:minmax(240px, 1.6fr) repeat(4, minmax(115px, .8fr)) 90px minmax(150px, .9fr) 140px;
    }

    .personasKpiGrid{

        grid-template-columns:repeat(3, minmax(180px,1fr));
    }
}

@media(max-width:1280px){

    .personasKpiGrid{

        grid-template-columns:repeat(2, minmax(170px,1fr));
    }

    .personasToolbar{

        flex-direction:column;
        align-items:flex-start;
    }

    .personaRow{

        grid-template-columns:1fr 1fr;
        gap:10px 14px;
    }

    .rowActions{

        justify-content:flex-start;
    }
}

@media(max-width:860px){

    .personasHeader{

        flex-direction:column;
        align-items:flex-start;
    }

    .personasFilters{

        flex-direction:column;
        align-items:stretch;
    }

    .personasPage .searchBox,
    .personasPage .filterGroup{

        min-width:0;
        width:100%;
    }

    .personasKpiGrid{

        grid-template-columns:1fr;
    }

    .personaRow{

        grid-template-columns:1fr;
    }
}

</style>
